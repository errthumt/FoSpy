name: Build Site and Deploy "incoming" to MkDocs

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install FoSpy
        run: |
          pip install -e .

      - name: Install fos_site
        run: |
          pip install -e ./mkdocs/fos_site

      - name: Check property tables and rebuild markdown stubs.
        run: |
          fos-site-build --deploy
      
      - name: Commit and Push Site Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "WORKFLOW: Docs Build" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge changes to dev
        if: github.ref == 'refs/heads/main'
        run: |
          git fetch --all
          git checkout dev
          git merge origin/main -m "Resync dev with doc corrections" || true
          git push origin dev
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install MkDocs dependencies
        run: |
          pip install mkdocs mkdocstrings mkdocstrings-python mkdocs-copy-markdown mkdocs-pygments pymdown-extensions black mike
      
      - name: Install svu
        run: |
          echo 'deb [trusted=yes] https://apt.fury.io/caarlos0/ /' | sudo tee /etc/apt/sources.list.d/caarlos0.list
          sudo apt update
          sudo apt install svu

      - name: Determine "incoming" version with svu
        id: version
        working-directory: mkdocs
        run: |
          # Get the next version from svu
          NEXT_VERSION=$(svu n)
          echo "svu n => $NEXT_VERSION"

          # Get the current mike version (may be empty)
          CURRENT_VERSION=$(mike list latest --json | jq -r '.version // empty')
          echo "mike current => $CURRENT_VERSION"

          # If svu n equals current mike version, bump patch instead
          if [ "$NEXT_VERSION" = "$CURRENT_VERSION" ]; then
            echo "next == current → using svu patch instead"
            NEXT_VERSION=$(svu patch)
          else
            echo "next != current → using svu n"
            echo "checking for existing incoming"
            INCOMING_VERSION=$(mike list incoming --json | jq -r '.version // empty')
            if [[ "$INCOMING_VERSION" = "" ||  ( "$NEXT_VERSION" = "$INCOMING_VERSION" && "$INCOMING_VERSION" != "$CURRENT_VERSION" ) ]] ; then
              echo "overwriting existing/missing incoming page"
            else
              echo "next != incoming → removing existing incoming page"
              mike delete "$INCOMING_VERSION" --push
            fi
          fi

          echo "final version => $NEXT_VERSION"
          echo "version=$NEXT_VERSION" >> $GITHUB_OUTPUT

      - name: Deploy to GitHub Pages
        working-directory: mkdocs
        run: |
          mike deploy --push --update-aliases --allow-empty "${{ steps.version.outputs.version }}" incoming
          mike retitle incoming "${{ steps.version.outputs.version }}" --push

