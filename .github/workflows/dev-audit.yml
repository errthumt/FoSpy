name: Dev Branch Audit

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  audit:
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install ruff vulture

      # -----------------------------
      # Clone audit branch into subfolder
      # -----------------------------
      - name: Clone audit branch
        run: |
          AUDIT_BRANCH="auditing"
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"

          echo "AUDIT_BRANCH=${AUDIT_BRANCH}" >> $GITHUB_ENV
          echo "BRANCH_NAME=${BRANCH_NAME}" >> $GITHUB_ENV

          rm -rf "${AUDIT_BRANCH}"

          git clone --branch "${AUDIT_BRANCH}" --single-branch \
            "https://github.com/${GITHUB_REPOSITORY}.git" "${AUDIT_BRANCH}"

          REPORT_DIR="${AUDIT_BRANCH}/${BRANCH_NAME}"
          echo "REPORT_DIR=${REPORT_DIR}" >> $GITHUB_ENV

          rm -rf "${REPORT_DIR}"
          mkdir -p "${REPORT_DIR}"

      # -----------------------------
      # Ruff Linting
      # -----------------------------
      - name: Run Ruff
        run: |
          ruff check ./FoSpy --output-format=json > "${REPORT_DIR}/ruff_report.json" || true

      # -----------------------------
      # Vulture
      # -----------------------------
      - name: Run Vulture
        run: |
          vulture ./FoSpy --min-confidence 0 --sort-by-size > "${REPORT_DIR}/vulture_report.txt" || true

      # -----------------------------
      # Upload Artifacts
      # -----------------------------
      - name: Upload Ruff Report
        uses: actions/upload-artifact@v4
        with:
          name: ruff-report
          path: "${{ env.REPORT_DIR }}/ruff_report.json"

      - name: Upload Vulture Report
        uses: actions/upload-artifact@v4
        with:
          name: vulture-report
          path: "${{ env.REPORT_DIR }}/vulture_report.txt"

      # -----------------------------
      # Commit + Push to audit branch
      # -----------------------------
      - name: Push reports to audit branch
        run: |
          cd "${AUDIT_BRANCH}"

          git add "${BRANCH_NAME}"
          git commit -m "Audit reports for ${BRANCH_NAME}" || echo "No changes to commit"
          git push origin audit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
