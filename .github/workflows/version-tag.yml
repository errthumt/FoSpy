name: New Version/Release
on: 
  push:
    tags:
      - v*
  release:
    types:
      - released

permissions:
  contents: write

jobs:
  check-for-main:
    name: Verify on main
    runs-on: ubuntu-latest
    outputs:
      keepTag: ${{ steps.check.outputs.keepTag }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for main branch
        id: check
        run: |
          branches=$(git branch -r --contains HEAD)
          branch=${branches##*/}
          echo $branch
          keepTag=$([ "$branch" == "main" ] && echo "true" || echo "false")
          echo "keepTag=$keepTag" >> $GITHUB_OUTPUT
  
  remove-tag:
    name: Remove forbidden tag
    runs-on: ubuntu-latest
    needs: check-for-main
    if: needs.check-for-main.outputs.keepTag == 'false'
    steps:
      - name: Generate Bypass Token
        id: bypass-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.WORKFLOW_APP_ID }}
          private-key: ${{ secrets.WORKFLOW_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Checkout with bypass token
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.bypass-token.outputs.token }}

      - name: Remove tag
        run: |
          git remote set-url origin https://x-access-token:${{ steps.bypass-token.outputs.token }}@github.com/${GITHUB_REPOSITORY}.git
          git push origin --delete ${{ github.ref }}

  build:
    name: Build PyPI Distribution
    runs-on: ubuntu-latest
    needs: check-for-main
    if: needs.check-for-main.outputs.keepTag == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install pypa/build
        run: >-
          python3 -m
          pip install
          build
          --user
      - name: Build a binary wheel and a source tarball
        run: python3 -m build
      - name: Store the distribution packages
        uses: actions/upload-artifact@v5
        with:
          name: python-package-distributions
          path: dist/

  check-for-testpypi:
    name: Check if TestPyPI version exists
    needs: build
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Check for TestPyPI version
        id: check
        run: |
          pip --version
          TARGET_VERSION=$(git describe --tags --abbrev=0 | cut -c 2-)
          echo "Target version: $TARGET_VERSION"
          echo $(pip index versions FoSpy --index-url https://test.pypi.org/simple/ --json)
          echo $(pip index versions FoSpy --index-url https://test.pypi.org/simple/ --json 2>/dev/null)
          VERSION_LIST=$(pip index versions FoSpy --index-url https://test.pypi.org/simple/ --json 2>/dev/null | jq '.versions')
          echo "$VERSION_LIST"
          if echo "$VERSION_LIST" | jq -e --arg target "$TARGET_VERSION" 'any(index($target))' > /dev/null; then
              echo "Version $TARGET_VERSION already exists on TestPyPI"
              echo "exists=true" >> $GITHUB_OUTPUT
          else
              echo "exists=false" >> $GITHUB_OUTPUT
          fi

  publish-to-testpypi:
    name: Publish Version to TestPyPI
    needs: check-for-testpypi
    runs-on: ubuntu-latest
    environment:
      name: TestPyPI Publish
      url: https://test.pypi.org/project/FoSpy
    permissions:
      id-token: write
    if: needs.check-for-testpypi.outputs.exists == 'false'
    steps:
      - name: Download all distribution packages
        uses: actions/download-artifact@v5
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  setup-mkdocs:
    name: Deploy Release to MkDocs
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release' &&  github.event.action == 'released' && !contains(github.event.head_commit.message, 'WORKFLOW')
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install MkDocs Dependencies
        run: |
          pip install mkdocs mkdocstrings mkdocstrings-python mkdocs-copy-markdown mkdocs-pygments pymdown-extensions black mike

      - name: Install FoSpy
        run: |
          pip install -e .
      
      - name: Remove placeholder "incoming" branch
        working-directory: mkdocs
        run: |
          git config --global user.name "mike-bot"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git
          git fetch origin gh-pages --depth=1

          incoming=$(mike list incoming --json | jq -r '.version // empty')
          echo $incoming
          if [[ "$incoming" != "" ]]; then
            mike delete $incoming --push
          fi
      - name: Deploy release branch to "latest" alias
        working-directory: mkdocs
        run: |
          mike deploy $(git describe --tags --abbrev=0) latest --update-aliases --push --allow-empty

  publish-to-pypi:
    name: Publish Release to PyPI
    needs: setup-mkdocs
    runs-on: ubuntu-latest
    environment:
      name: PyPI Publish
      url: https://pypi.org/project/FoSpy
    permissions:
      id-token: write
    steps:
      - name: Download all distribution packages
        uses: actions/download-artifact@v5
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1