name: Publish FoSpy to PyPI and TestPyPI
on: 
  push:
    tags:
      - v*
jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - id: check
        run: |
          if [[ "${GITHUB_BASE_REF}" != "main" ]]; then
            echo "should_run=false" >> $GITHUB_OUTPUT
          else
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi



  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    needs: gate
    if: ${{ !endsWith(github.event.base_ref, 'main') }}
    
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install pypa/build
        run: >-
          python3 -m
          pip install
          build
          --user
      - name: Build a binary wheel and a source tarball
        run: python3 -m build
      - name: Store the distribution packages
        uses: actions/upload-artifact@v5
        with:
          name: python-package-distributions
          path: dist/
  publish-to-pypi:
    name: Publish to PyPI
    if: github.event_name == 'release' &&  github.event.action == 'released' && !contains(github.event.head_commit.message, 'WORKFLOW')
    needs:
      - build
    runs-on: ubuntu-latest
    environment:
      name: PyPI Publish
      url: https://pypi.org/project/FoSpy
    permissions:
      id-token: write
    
    steps:
      - name: Download all distribution packages
        uses: actions/download-artifact@v5
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
  publish-to-testpypi:
    name: Publish to TestPyPI
    needs:
      - build
    runs-on: ubuntu-latest
    environment:
      name: TestPyPI Publish
      url: https://test.pypi.org/project/FoSpy
    permissions:
      id-token: write
    
    steps:
      - name: Download all distribution packages
        uses: actions/download-artifact@v5
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/