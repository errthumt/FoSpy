name: Deploy MkDocs site

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install FoSpy
        run: |
          pip install -e .

      - name: Install fos_site
        run: |
          pip install -e ./mkdocs/fos_site

      - name: Install build dependencies
        run: |
          pip install mkdocs mkdocstrings mkdocstrings-python mkdocs-copy-markdown mkdocs-pygments pymdown-extensions black mike
          curl -sSfL https://raw.githubusercontent.com/caarlos0/svu/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Check property tables and rebuild markdown stubs.
        run: |
          fos-site-build --deploy

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "WORKFLOW: Docs Build" || echo "No changes to commit"

      - name: Push changes
        run: git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Fetch all branches
        run: git fetch --all

      - name: Merge main back into dev
        if: github.ref == 'refs/heads/main'
        run: |
          git checkout dev
          git merge origin/main -m "Resync dev with doc corrections" || true
          git push origin dev
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine mike version using svu
        id: version
        run: |
          # Get the next version from svu
          NEXT_VERSION=$(svu n)
          echo "svu n => $NEXT_VERSION"

          # Get the current mike version (may be empty)
          CURRENT_VERSION=$(mike list --json | jq -r '.[0].version // empty')
          echo "mike current => $CURRENT_VERSION"

          # If svu n equals current mike version, bump patch instead
          if [ "$NEXT_VERSION" = "$CURRENT_VERSION" ]; then
            echo "next == current → using svu patch instead"
            NEXT_VERSION=$(svu patch)
          fi

          echo "final version => $NEXT_VERSION"
          echo "version=$NEXT_VERSION" >> $GITHUB_OUTPUT

      - name: Deploy to GitHub Pages
        working-directory: mkdocs
        run: |
          mike deploy --push --update-aliases "${{ steps.version.outputs.version }}" incoming

